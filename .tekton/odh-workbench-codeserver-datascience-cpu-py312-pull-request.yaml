apiVersion: tekton.dev/v1
kind: PipelineRun
# retrigger Konflux builds to fix https://issues.redhat.com/browse/RHOAIENG-31914
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/notebooks?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-comment: "^/(build-konflux|kfbuild-codeserver)"
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && target_branch == "main" &&
      !("manifests/base/params-latest.env".pathChanged()) &&
      (
        ".tekton/odh-workbench-codeserver-datascience-cpu-py312-pull-request.yaml".pathChanged() ||
        "codeserver/ubi9-python-3.12/**".pathChanged() ||
        "codeserver/ubi9-python-3.12/build-args/cpu.conf".pathChanged()
      ) && body.repository.full_name == "red-hat-data-services/notebooks"
  labels:
    appstudio.openshift.io/application: automation
    appstudio.openshift.io/component: pull-request-pipelines-notebooks
    pipelines.appstudio.openshift.io/type: build
  name: odh-workbench-codeserver-datascience-cpu-py312-on-pull-request-75964
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 8h0m0s
    tasks: "4h0m0s"
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: enable-cache-proxy
    value: "true"
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/rhoai/pull-request-pipelines:notebooks-{{revision}}
  - name: additional-tags
    value:
    - '{{target_branch}}-{{revision}}'
  - name: additional-labels
    value:
    - version=on-pr-{{revision}}
    - io.openshift.tags=odh-workbench-codeserver-datascience-cpu-py312
  - name: params-file
    value: codeserver/ubi9-python-3.12/build-params.yaml
  - name: rhoai-version
    value: "3.4.0-ea.2"
  - name: build-image-index
    value: true
  - name: image-expires-after
    value: 5d
  - name: enable-slack-failure-notification
    value: "false"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: separate-params 
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-pull-request-pipelines
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
