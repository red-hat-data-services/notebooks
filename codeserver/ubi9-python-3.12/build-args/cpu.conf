# Local/GHA hybrid build for RHOAI 3.3 (public UBI9 + reduced VS Code parallelism on GHA).
# Prefetch npm into cachi2; install Python/RPMs/oc over the network (same as rhoai-2.25).
BASE_IMAGE=registry.access.redhat.com/ubi9/python-312:latest
PYLOCK_FLAVOR=cpu
LABEL_REGISTRY_PREFIX=rhoai
LABEL_COMPONENT=odh-workbench-codeserver-datascience-cpu-py312-rhel9
PRODUCT=rhoai
RELEASE=3.3
GHA_BUILD=true
